<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Portfolio</title>
    <script>
      // Single Page App redirect for GitHub Pages.
      // Redirects all 404s back to index.html with the path encoded as a
      // query string so the client-side router can restore it.
      // See: https://github.com/rafgraph/spa-github-pages
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1)
            .join("/") +
          "/?/" +
          l.pathname.slice(1).replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
